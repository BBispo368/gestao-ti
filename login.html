<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Inventário TI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --login-bg: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-glow: rgba(59, 130, 246, 0.5);
    }

    body.login-page {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--login-bg);
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Decorative blobs */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent-glow);
      filter: blur(80px);
      border-radius: 50%;
      z-index: 0;
      animation: float 20s infinite alternate;
    }
    .blob-1 { top: -100px; right: -100px; background: rgba(37, 99, 235, 0.2); }
    .blob-2 { bottom: -100px; left: -100px; background: rgba(139, 92, 246, 0.15); }

    @keyframes float {
      from { transform: translate(0, 0); }
      to { transform: translate(50px, 50px); }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 15px var(--accent-glow));
    }

    .login-header h1 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.025em;
    }

    .login-header p {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #cbd5e1;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 0.875rem;
      transition: color 0.3s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 0.9375rem;
      transition: all 0.3s;
      outline: none;
      box-sizing: border-box;
    }

    .input-wrapper input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .input-wrapper input:focus + i {
      color: #3b82f6;
    }

    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn-login:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
    }

    .login-footer p {
      color: #64748b;
      font-size: 0.8125rem;
    }

    .login-footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* Error Message */
    #errorMessage {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 0.75rem;
      border-radius: 10px;
      font-size: 0.8125rem;
      margin-bottom: 1.5rem;
      display: none;
      text-align: center;
    }

    /* Loading Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-login.loading .spinner {
      display: block;
    }
    .btn-login.loading .btn-text {
      display: none;
    }
  </style>
</head>
<body class="login-page">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-container">
    <div class="login-header">
      <img src="./img/app_logo.png" alt="Logo" class="login-logo">
      <h1>Inventário TI</h1>
      <p>Acesse sua conta para continuar</p>
    </div>

    <div id="errorMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail Corporativo</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-text">Entrar no Sistema</span>
        <i class="fa-solid fa-arrow-right btn-text"></i>
      </button>
    </form>

    <div class="login-footer">
      <p>Esqueceu sua senha? <a href="#">Contate o TI</a></p>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
